---
# ==========================================
# СЦЕНАРИЙ ЗАПУСКА (drupal_stack_state == "present")
# ==========================================

- name: "Создание директории проекта"
  ansible.builtin.file:
    path: "{{ drupal_project_dir }}"
    state: directory
    mode: '0755'
  when: drupal_stack_state == "present"

- name: "Генерация файла docker-compose.yml из шаблона"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ drupal_project_dir }}/docker-compose.yml"
    mode: '0644'
  when: drupal_stack_state == "present"

- name: "Запуск Docker Compose стека (Drupal + MariaDB)"
  ansible.builtin.command:
    cmd: "docker compose up -d"
    chdir: "{{ drupal_project_dir }}"
  register: compose_up_result
  changed_when: "'Created' in compose_up_result.stdout or 'Started' in compose_up_result.stdout or 'Recreated' in compose_up_result.stdout"
  when: drupal_stack_state == "present"


# ==========================================
# СЦЕНАРИЙ УДАЛЕНИЯ (drupal_stack_state == "absent")
# ==========================================

- name: "Проверка наличия файла docker-compose.yml перед удалением"
  ansible.builtin.stat:
    path: "{{ drupal_project_dir }}/docker-compose.yml"
  register: compose_file

- name: "Остановка стека, удаление томов и образов"
  ansible.builtin.command:
    cmd: "docker compose down -v --rmi all"
    chdir: "{{ drupal_project_dir }}"
  register: compose_down_result
  changed_when: "'Removed' in compose_down_result.stdout or 'Stopped' in compose_down_result.stdout"
  when: 
    - drupal_stack_state == "absent"
    - compose_file.stat.exists

- name: "Удаление директории проекта"
  ansible.builtin.file:
    path: "{{ drupal_project_dir }}"
    state: absent
  when: drupal_stack_state == "absent"
